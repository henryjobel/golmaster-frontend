<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>নতুন গ্রাহক - Gold Business Manager Preview</title>
    <link rel="stylesheet" href="assets/lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/site.css" />
    <link rel="stylesheet" href="assets/common.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="assets/JewelleryManagement.styles.css" />
    <script src="assets/lib/jquery/dist/jquery.min.js"></script>
    <script src="assets/lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/site.js?v=20260418-live-backend"></script>
</head>
<body>
    <div class="preview-bar">
        <div class="preview-links">
            <a class="preview-link" href="index.html">হোম</a>
<a class="preview-link" href="customer-index.html">গ্রাহক</a>
<a class="preview-link active" href="customer-create.html">নতুন গ্রাহক</a>
<a class="preview-link" href="buysell-index.html">ক্রয়</a>
<a class="preview-link" href="buysell-sell.html">বিক্রয়</a>
<a class="preview-link" href="sms-index.html">SMS</a>
<a class="preview-link" href="report-index.html">রিপোর্ট</a>
<a class="preview-link" href="privacy.html">Privacy</a>
        </div>
    </div>
    <div class="container preview-shell">
        <main role="main" class="pb-3">
            <style>
                .form-container {
                    background: white;
                    border-radius: 30px;
                    padding: 30px;
                    box-shadow: var(--shadow);
                    max-width: 600px;
                    margin: 0 auto;
                }

                .form-title {
                    color: #4a3b1a;
                    font-size: 1.8rem;
                    font-weight: 700;
                    margin-bottom: 30px;
                    text-align: center;
                }

                    .form-title i {
                        color: #b8860b;
                        margin-right: 10px;
                    }

                .form-group {
                    margin-bottom: 20px;
                }

                .form-label {
                    color: #4a3b1a;
                    font-weight: 600;
                    margin-bottom: 8px;
                    display: block;
                }

                .form-control {
                    border: 2px solid #f0e8d8;
                    border-radius: 15px;
                    padding: 12px 15px;
                    width: 100%;
                    transition: all 0.3s ease;
                }

                    .form-control:focus {
                        border-color: #b8860b;
                        outline: none;
                        box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.1);
                    }

                .btn-submit {
                    background: linear-gradient(145deg, #b8860b, #daa520);
                    color: white;
                    border: none;
                    padding: 15px 30px;
                    border-radius: 30px;
                    font-weight: 600;
                    width: 100%;
                    font-size: 1.1rem;
                    transition: all 0.3s ease;
                }

                .btn-submit:hover {
                    transform: translateY(-3px);
                    box-shadow: 0 10px 25px rgba(184, 134, 11, 0.3);
                }

                .btn-submit:disabled {
                    opacity: 0.75;
                    cursor: not-allowed;
                }

                .form-feedback {
                    margin-top: 16px;
                    border-radius: 14px;
                    padding: 12px 15px;
                    font-weight: 600;
                    display: none;
                }

                .form-feedback.success,
                .form-feedback.error {
                    display: block;
                }

                .form-feedback.success {
                    background: #e8f5e9;
                    color: #2e7d32;
                }

                .form-feedback.error {
                    background: #fdecea;
                    color: #c62828;
                }

                /* ============================================
                   RESPONSIVE DESIGN - Customer Create Form
                   ============================================ */

                /* Extra Small Phones (< 360px) */
                @media (max-width: 359px) {
                    .form-container {
                        padding: 20px;
                        border-radius: 20px;
                    }

                    .form-title {
                        font-size: 1.4rem;
                        margin-bottom: 20px;
                    }

                    .form-group {
                        margin-bottom: 16px;
                    }

                    .form-label {
                        font-size: 12px;
                    }

                    .form-control {
                        padding: 10px 12px;
                        font-size: 12px;
                    }

                    .btn-submit {
                        padding: 12px 18px;
                        font-size: 13px;
                    }
                }

                /* Small Phones (360px - 480px) */
                @media (min-width: 360px) and (max-width: 480px) {
                    .form-container {
                        max-width: 100%;
                        padding: 22px;
                        border-radius: 22px;
                    }

                    .form-title {
                        font-size: 1.5rem;
                        margin-bottom: 22px;
                    }

                    .form-group {
                        margin-bottom: 18px;
                    }

                    .form-label {
                        font-size: 13px;
                        margin-bottom: 8px;
                    }

                    .form-control {
                        padding: 12px 14px;
                        font-size: 13px;
                        min-height: 44px;
                    }

                    .btn-submit {
                        padding: 13px 20px;
                        font-size: 14px;
                        min-height: 44px;
                    }

                    textarea.form-control {
                        min-height: 100px;
                    }
                }

                /* Medium Phones (480px - 600px) */
                @media (min-width: 480px) and (max-width: 600px) {
                    .form-container {
                        max-width: 500px;
                        margin: 0 auto;
                        padding: 26px;
                        border-radius: 24px;
                    }

                    .form-title {
                        font-size: 1.6rem;
                        margin-bottom: 24px;
                    }

                    .form-group {
                        margin-bottom: 20px;
                    }

                    .form-label {
                        font-size: 14px;
                    }

                    .form-control {
                        padding: 13px 15px;
                        font-size: 14px;
                        min-height: 46px;
                    }

                    .btn-submit {
                        padding: 14px 22px;
                        font-size: 15px;
                        min-height: 46px;
                    }

                    textarea.form-control {
                        min-height: 120px;
                    }
                }

                /* Tablets (600px+) */
                @media (min-width: 600px) {
                    .form-container {
                        max-width: 600px;
                        margin: 0 auto;
                        padding: 30px;
                        border-radius: 30px;
                    }

                    .form-title {
                        font-size: 1.8rem;
                        margin-bottom: 30px;
                    }

                    .form-group {
                        margin-bottom: 20px;
                    }

                    .form-label {
                        font-size: 14px;
                        margin-bottom: 8px;
                    }

                    .form-control {
                        padding: 14px 16px;
                        font-size: 15px;
                        min-height: 48px;
                    }

                    .btn-submit {
                        padding: 15px 24px;
                        font-size: 16px;
                        min-height: 48px;
                    }

                    textarea.form-control {
                        min-height: 120px;
                    }
                }

                /* Large Tablets & Desktops (800px+) */
                @media (min-width: 800px) {
                    .form-container {
                        max-width: 700px;
                        padding: 40px;
                        border-radius: 32px;
                    }

                    .form-title {
                        font-size: 2rem;
                        margin-bottom: 32px;
                    }

                    .form-group {
                        margin-bottom: 24px;
                    }

                    .form-control {
                        padding: 15px 18px;
                        font-size: 15px;
                        min-height: 50px;
                    }

                    .btn-submit {
                        padding: 16px 28px;
                        font-size: 17px;
                        min-height: 50px;
                    }

                    textarea.form-control {
                        min-height: 140px;
                    }
                }

                /* Touch-friendly improvements */
                @media (hover: none) and (pointer: coarse) {
                    .form-control,
                    .btn-submit {
                        min-height: 44px;
                    }

                    input[type="checkbox"],
                    input[type="radio"] {
                        width: 20px;
                        height: 20px;
                        cursor: pointer;
                    }

                    label {
                        cursor: pointer;
                    }
                }

                /* Landscape orientation */
                @media (orientation: landscape) and (max-height: 600px) {
                    .form-container {
                        padding: 16px;
                    }

                    .form-title {
                        font-size: 1.2rem;
                        margin-bottom: 12px;
                    }

                    .form-group {
                        margin-bottom: 12px;
                    }

                    .form-control {
                        padding: 10px 12px;
                        font-size: 13px;
                        min-height: 40px;
                    }

                    .btn-submit {
                        padding: 10px 16px;
                        font-size: 14px;
                        min-height: 40px;
                    }

                    textarea.form-control {
                        min-height: 80px;
                    }
                }
            </style>

            <div class="form-container">
                <h2 class="form-title">
                    <i class="fas fa-user-plus"></i>
                    নতুন গ্রাহক যোগ করুন
                </h2>

                <form id="customerCreateForm">
                    <div class="form-group">
                        <label class="form-label" for="customerName">নাম *</label>
                        <input id="customerName" name="name" class="form-control" placeholder="গ্রাহকের পুরো নাম" required />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="customerPhone">মোবাইল নম্বর *</label>
                        <input id="customerPhone" name="phone" class="form-control" placeholder="০১৭১২-৩৪৫৬৭৮" required />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="customerAddress">ঠিকানা</label>
                        <textarea id="customerAddress" name="address" class="form-control" rows="3" placeholder="গ্রাহকের ঠিকানা"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="customerStatus">স্ট্যাটাস</label>
                        <select id="customerStatus" name="status" class="form-control">
                            <option value="সক্রিয়">সক্রিয়</option>
                            <option value="নতুন">নতুন</option>
                            <option value="প্রিমিয়াম">প্রিমিয়াম</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-submit">
                        <i class="fas fa-save me-2"></i>
                        গ্রাহক সংরক্ষণ করুন
                    </button>

                    <div id="formFeedback" class="form-feedback"></div>
                </form>
            </div>
        </main>
    </div>
    <script src="assets/js/customer-create.js"></script>
</body>
</html>
